services:
  app:
    build: .
    image: timerrr
    container_name: timerrr
    restart: unless-stopped
    expose:
      - "5001"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required — set it in .env or your shell}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - BASE_URL=${BASE_URL:-}
    volumes:
      - data:/app/.data
    networks:
      - web

networks:
  web:
    external: true

volumes:
  data:
